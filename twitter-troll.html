<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wait...</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #fdf6ee;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, #f9d6e8bb 0%, transparent 70%);
    pointer-events: none;
  }
  .box {
    max-width: 380px;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  .emoji {
    font-size: 4rem;
    margin-bottom: 20px;
    display: block;
    animation: wobble 1s ease infinite alternate;
  }
  @keyframes wobble {
    from { transform: rotate(-8deg); }
    to   { transform: rotate(8deg); }
  }
  h1 {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    color: #3d2c2c;
    margin-bottom: 12px;
  }
  p {
    font-size: 0.9rem;
    color: #9e8484;
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .back-btn {
    display: inline-block;
    background: #fde8ee;
    color: #a04060;
    border: 1px solid #f5c0ce;
    padding: 10px 24px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 0.85rem;
    transition: transform 0.2s;
  }
  .back-btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="box">
    <p style="font-size:0.75rem;color:#c0a0a0;line-height:1.8;margin-bottom:24px;text-align:left;">twitter is cooked and you know it.</p>
    <a class="back-btn" href="index.html">← take me back</a>
  </div>
</body>
</html>
